<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EngineEye</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body onload="auth.redirectIfLoggedIn()">
    <div class="container">
        <div class="glass-card" style="width: 100%; max-width: 450px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="background: var(--primary); width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i data-lucide="lock" style="color: var(--bg-dark);"></i>
                </div>
                <h2>Welcome Back</h2>
                <p style="color: var(--text-dim);">Sign in to access your dashboard</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" size="18"></i>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="key" size="18"></i>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Authenticate</button>
                <div style="text-align: center; margin-top: 24px;">
                    <p style="color: var(--text-dim); font-size: 14px;">New user? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const { ok, data } = await apiCall('/login', 'POST', { username, password });
            
            if (ok) {
                auth.setSession(data.token, data.username);
                showMessage('success', 'Logged in successfully! Redirecting...');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } else {
                showMessage('error', data.error || 'Invalid credentials');
            }
        });
    </script>
</body>
</html>
