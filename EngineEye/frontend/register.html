<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EngineEye</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body onload="auth.redirectIfLoggedIn()">
    <div class="container" style="padding: 40px 20px;">
        <div class="glass-card" style="width: 100%; max-width: 500px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="background: var(--secondary); width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i data-lucide="user-plus" style="color: white;"></i>
                </div>
                <h2>Create Account</h2>
                <p style="color: var(--text-dim);">Secure your vehicle with AI alerts</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" size="18"></i>
                        <input type="text" id="username" placeholder="Choose a username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" size="18"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="key" size="18"></i>
                        <input type="password" id="password" placeholder="Min. 8 characters" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number (for SMS Alerts)</label>
                    <div class="input-wrapper">
                        <i data-lucide="phone" size="18"></i>
                        <input type="tel" id="phone" placeholder="+91 98765 43210" required>
                    </div>
                    <p style="color: var(--text-dim); font-size: 11px; margin-top: 6px;">Include country code (e.g., +1 for US, +91 for India)</p>
                </div>
                <button type="submit" class="btn-primary">Create Secure Account</button>
                <div style="text-align: center; margin-top: 24px;">
                    <p style="color: var(--text-dim); font-size: 14px;">Already registered? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In Instead</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone_number: document.getElementById('phone').value
            };
            
            const { ok, data } = await apiCall('/register', 'POST', userData);
            
            if (ok) {
                showMessage('success', 'Account created! Redirecting to login...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                showMessage('error', data.error || 'Registration failed');
            }
        });
    </script>
</body>
</html>
